name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 當程式碼推送到 main 分支時觸發

# 設定工作流所需的權限，允許寫入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 避免多個部署衝突，若有新的 commit 進入則自動取消舊的部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm' # 自動快取 npm 依賴，加速未來的編譯速度
          cache-dependency-path: './media-compressor/package-lock.json'

      - name: Install Dependencies
        run: npm ci # 使用 ci 確保依賴版本與 package-lock.json 完全一致

      - name: Build Project
        run: npm run build # 編譯 React + Vite 生產環境版本，預設輸出至 dist 輸出夾

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 指向 Vite 打包出來的靜態資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
