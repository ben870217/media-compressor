name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: './media-compressor/package-lock.json' # 這裡你設定得很正確！

      - name: Install Dependencies
        run: npm ci
        working-directory: ./media-compressor # 👈 補上這行，叫它進去子資料夾安裝

      - name: Build Project
        run: npm run build
        working-directory: ./media-compressor # 👈 補上這行，叫它在子資料夾內編譯

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './media-compressor/dist' # 👈 確保路徑指向子資料夾打包出來的 dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
